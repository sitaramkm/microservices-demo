name: "Build and Push Images. This is version managed by Sitaram"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.10.5.05012026-01)"
        required: true
        type: string
      services:
        description: "Services to build (comma-separated, or 'all')"
        required: false
        default: "all"
        type: string

env:
  REGISTRY: ${{ secrets.DOCKERHUB_REGISTRY }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }} .
          git checkout ${{ github.sha }}

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Install skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Build and push (all services)
        if: ${{ inputs.services == 'all' }}
        run: |
          skaffold build \
            -d ${{ env.REGISTRY }} \
            --tag ${{ inputs.tag }} \
            --platform=linux/amd64 \
            --push

      - name: Build and push (selected services)
        if: ${{ inputs.services != 'all' }}
        run: |
          # Convert comma-separated list to --build-artifacts flags
          ARTIFACTS=""
          IFS=',' read -ra SVCS <<< "${{ inputs.services }}"
          for svc in "${SVCS[@]}"; do
            ARTIFACTS="$ARTIFACTS --build-artifacts $(echo $svc | xargs)"
          done

          skaffold build \
            -d ${{ env.REGISTRY }} \
            --tag ${{ inputs.tag }} \
            --platform=linux/amd64 \
            --push \
            $ARTIFACTS

      - name: Summary
        run: |
          echo "### Build complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Services:** ${{ inputs.services }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next step: run \`./kustomize/update-manifests.sh ${{ inputs.tag }}\` locally." >> $GITHUB_STEP_SUMMARY